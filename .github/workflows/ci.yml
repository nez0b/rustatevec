name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu = x86_64 (AVX), macos-latest = aarch64 (NEON): both SIMD targets.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Pin to the project MSRV for deterministic CI (no surprise lints from a moving
      # `stable`). `-D warnings` is scoped to clippy below so it never denies dep warnings.
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build (no default features — dependency-free core)
        run: cargo build -p qsv-core --no-default-features --features f64

  docs:
    name: build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        # mdBook 0.5 needs rustc 1.88; pin the 0.4 line for our 1.86 toolchain.
        run: cargo install mdbook --version "^0.4" --locked
      - name: Build the book
        run: mdbook build docs
